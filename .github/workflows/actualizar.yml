name: Actualizar cartera Market Lens

on:
  schedule:
    - cron: "0 12 * * *"      # todos los dias 12:00 UTC (7:00 AM Colombia)
  workflow_dispatch: {}         # permite correrlo a mano desde la pestana Actions

permissions:
  contents: write               # para poder guardar el tablero actualizado

jobs:
  actualizar:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el repo
        uses: actions/checkout@v4

      - name: Preparar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Ejecutar el motor
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python motor_ensemble.py --alert

      - name: Publicar el tablero
        run: |
          git config user.name "market-lens-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin
          git reset --soft origin/main
          git add docs/motor_data.json estado.json
          git commit -m "Actualizar cartera $(date -u +%Y-%m-%d)" || echo "sin cambios que publicar"
          git push origin HEAD:main
